{% extends "admin/base.html" %}
{% block title %}Data Plans{% endblock %}
{% block page_title %}Data Plans{% endblock %}

{% block content %}
<div class="flex justify-end mb-6">
    <button onclick="openAddModal()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
        <i data-lucide="plus" class="w-4 h-4 inline"></i> Add Data Plan
    </button>
</div>

<!-- Plans by Network -->
<div id="plans-container" class="space-y-6">Loading...</div>

<!-- Add/Edit Modal -->
<div id="plan-modal" class="fixed inset-0 z-50 hidden items-center justify-center modal-backdrop">
    <div class="bg-white rounded-xl shadow-xl p-6 w-full max-w-md mx-4">
        <h3 class="text-lg font-semibold text-gray-900 mb-4" id="modal-title">Add Data Plan</h3>
        <form onsubmit="submitPlan(event)">
            <input type="hidden" id="plan-id">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Network</label>
                <select id="plan-network" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                    <option value="mtn">MTN</option>
                    <option value="airtel">Airtel</option>
                    <option value="glo">Glo</option>
                    <option value="etisalat">9mobile</option>
                </select>
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Plan Code</label>
                <input type="text" id="plan-code" required placeholder="e.g., mtn-1gb-30d"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Plan Name</label>
                <input type="text" id="plan-name" required placeholder="e.g., 1GB"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Price (₦)</label>
                <input type="number" id="plan-price" required min="1" step="0.01" placeholder="300"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Validity</label>
                <input type="text" id="plan-validity" required placeholder="e.g., 30 Days"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
            </div>
            <div class="mb-4">
                <label class="flex items-center gap-2">
                    <input type="checkbox" id="plan-active" checked class="rounded border-gray-300">
                    <span class="text-sm text-gray-700">Active</span>
                </label>
            </div>
            <div class="flex gap-3">
                <button type="button" onclick="closeModal()" class="flex-1 px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50">Cancel</button>
                <button type="submit" class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Save</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', loadPlans);

async function loadPlans() {
    try {
        const data = await fetchJSON('/api/v1/admin/data-plans/data-plans');
        const container = document.getElementById('plans-container');

        if (Object.keys(data).length === 0) {
            container.innerHTML = '<p class="text-center text-gray-400 py-8">No data plans found</p>';
            return;
        }

        let html = '';
        for (const [network, plans] of Object.entries(data)) {
            html += `
                <div class="bg-white rounded-xl shadow-sm border border-gray-100">
                    <div class="px-6 py-4 border-b border-gray-100">
                        <h3 class="text-lg font-semibold text-gray-900 uppercase">${network}</h3>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="admin-table w-full">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Code</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Name</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Price</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Validity</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100">
                                ${plans.map(plan => `
                                    <tr>
                                        <td class="px-6 py-3 text-sm font-mono text-gray-900">${plan.plan_code}</td>
                                        <td class="px-6 py-3 text-sm text-gray-600">${plan.name}</td>
                                        <td class="px-6 py-3 text-sm font-medium text-gray-900">${formatCurrency(plan.price)}</td>
                                        <td class="px-6 py-3 text-sm text-gray-600">${plan.validity}</td>
                                        <td class="px-6 py-3">${statusBadge(plan.is_active ? 'active' : 'inactive')}</td>
                                        <td class="px-6 py-3">
                                            <div class="flex gap-2">
                                                <button onclick='editPlan(${JSON.stringify(plan).replace(/'/g, "&#39;")})' class="text-blue-600 hover:text-blue-800 text-sm">Edit</button>
                                                <button onclick="deletePlan('${plan.id}')" class="text-red-600 hover:text-red-800 text-sm">Delete</button>
                                            </div>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
    } catch (error) {
        showToast('Failed to load data plans', 'error');
    }
}

function openAddModal() {
    document.getElementById('modal-title').textContent = 'Add Data Plan';
    document.getElementById('plan-id').value = '';
    document.getElementById('plan-network').value = 'mtn';
    document.getElementById('plan-code').value = '';
    document.getElementById('plan-name').value = '';
    document.getElementById('plan-price').value = '';
    document.getElementById('plan-validity').value = '';
    document.getElementById('plan-active').checked = true;
    document.getElementById('plan-modal').classList.remove('hidden');
    document.getElementById('plan-modal').classList.add('flex');
}

function editPlan(plan) {
    document.getElementById('modal-title').textContent = 'Edit Data Plan';
    document.getElementById('plan-id').value = plan.id;
    document.getElementById('plan-network').value = plan.network;
    document.getElementById('plan-code').value = plan.plan_code;
    document.getElementById('plan-name').value = plan.name;
    document.getElementById('plan-price').value = plan.price;
    document.getElementById('plan-validity').value = plan.validity;
    document.getElementById('plan-active').checked = plan.is_active;
    document.getElementById('plan-modal').classList.remove('hidden');
    document.getElementById('plan-modal').classList.add('flex');
}

function closeModal() {
    document.getElementById('plan-modal').classList.add('hidden');
    document.getElementById('plan-modal').classList.remove('flex');
}

async function submitPlan(e) {
    e.preventDefault();
    const id = document.getElementById('plan-id').value;
    const body = {
        network: document.getElementById('plan-network').value,
        plan_code: document.getElementById('plan-code').value,
        name: document.getElementById('plan-name').value,
        price: parseFloat(document.getElementById('plan-price').value),
        validity: document.getElementById('plan-validity').value,
        is_active: document.getElementById('plan-active').checked,
    };

    try {
        if (id) {
            // Update existing plan
            body.id = id;
            await fetchJSON(`/api/v1/admin/data-plans/data-plans`, { method: 'POST', body: JSON.stringify(body) });
            showToast('Data plan updated', 'success');
        } else {
            await fetchJSON('/api/v1/admin/data-plans/data-plans', { method: 'POST', body: JSON.stringify(body) });
            showToast('Data plan created', 'success');
        }
        closeModal();
        loadPlans();
    } catch (error) {
        showToast(`Failed to save data plan: ${error.message}`, 'error');
    }
}

async function deletePlan(planId) {
    if (!confirm('Are you sure you want to delete this data plan?')) return;

    try {
        await fetchJSON(`/api/v1/admin/data-plans/data-plans/${planId}`, { method: 'DELETE' });
        showToast('Data plan deleted', 'success');
        loadPlans();
    } catch (error) {
        showToast(`Failed to delete data plan: ${error.message}`, 'error');
    }
}
</script>
{% endblock %}
