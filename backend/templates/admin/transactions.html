{% extends "admin/base.html" %}
{% block title %}Transactions{% endblock %}
{% block page_title %}Transactions{% endblock %}

{% block content %}
<!-- Filters -->
<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 mb-6">
    <div class="flex flex-wrap gap-4 items-end">
        <div class="flex-1 min-w-48">
            <label class="block text-sm font-medium text-gray-700 mb-1">Search</label>
            <input type="text" id="search-input" placeholder="Reference, phone..."
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Type</label>
            <select id="type-filter" class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                <option value="">All Types</option>
                <option value="airtime">Airtime</option>
                <option value="data">Data</option>
                <option value="wallet_fund">Wallet Fund</option>
                <option value="refund">Refund</option>
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
            <select id="status-filter" class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                <option value="">All Status</option>
                <option value="success">Success</option>
                <option value="pending">Pending</option>
                <option value="failed">Failed</option>
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Network</label>
            <select id="network-filter" class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                <option value="">All Networks</option>
                <option value="mtn">MTN</option>
                <option value="airtel">Airtel</option>
                <option value="glo">Glo</option>
                <option value="etisalat">9mobile</option>
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">From</label>
            <input type="date" id="date-from" class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">To</label>
            <input type="date" id="date-to" class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
        </div>
        <button onclick="loadTransactions(1)" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
            <i data-lucide="search" class="w-4 h-4 inline"></i> Filter
        </button>
        <button onclick="exportCSV()" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700">
            <i data-lucide="download" class="w-4 h-4 inline"></i> Export CSV
        </button>
    </div>
</div>

<!-- Transactions Table -->
<div class="bg-white rounded-xl shadow-sm border border-gray-100">
    <div class="overflow-x-auto">
        <table class="admin-table w-full">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Reference</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">User</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Type</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Network</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Amount</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Date</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>
                </tr>
            </thead>
            <tbody id="txns-body" class="divide-y divide-gray-100">
                <tr><td colspan="8" class="px-4 py-8 text-center text-gray-400">Loading...</td></tr>
            </tbody>
        </table>
    </div>
    <div class="px-6 py-4 border-t border-gray-100">
        <div id="pagination"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let currentPage = 1;

document.addEventListener('DOMContentLoaded', () => {
    loadTransactions(1);
    document.getElementById('search-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') loadTransactions(1);
    });
});

async function loadTransactions(page) {
    currentPage = page;
    const params = new URLSearchParams({
        page: page,
        page_size: 20,
    });

    const search = document.getElementById('search-input').value;
    const type = document.getElementById('type-filter').value;
    const status = document.getElementById('status-filter').value;
    const network = document.getElementById('network-filter').value;
    const dateFrom = document.getElementById('date-from').value;
    const dateTo = document.getElementById('date-to').value;

    if (search) params.append('search', search);
    if (type) params.append('type', type);
    if (status) params.append('status', status);
    if (network) params.append('network', network);
    if (dateFrom) params.append('date_from', dateFrom);
    if (dateTo) params.append('date_to', dateTo);

    try {
        const data = await fetchJSON(`/api/v1/admin/transactions/transactions?${params}`);
        renderTable('txns-body', data.items, (txn) => `
            <tr>
                <td class="px-6 py-3 text-sm font-mono text-gray-900">${txn.reference}</td>
                <td class="px-6 py-3 text-sm">
                    <a href="/admin/users/${txn.user_id}" class="text-blue-600 hover:text-blue-800">${txn.user_phone || '-'}</a>
                </td>
                <td class="px-6 py-3 text-sm text-gray-600 capitalize">${txn.type}</td>
                <td class="px-6 py-3 text-sm text-gray-600 uppercase">${txn.network || '-'}</td>
                <td class="px-6 py-3 text-sm font-medium text-gray-900">${formatCurrency(txn.amount)}</td>
                <td class="px-6 py-3">${statusBadge(txn.status)}</td>
                <td class="px-6 py-3 text-sm text-gray-500">${formatDateTime(txn.created_at)}</td>
                <td class="px-6 py-3">
                    <a href="/admin/transactions/${txn.id}" class="text-blue-600 hover:text-blue-800 text-sm">View</a>
                </td>
            </tr>
        `);
        renderPagination('pagination', data.page, data.total_pages, 'loadTransactions');
    } catch (error) {
        showToast('Failed to load transactions', 'error');
    }
}

function exportCSV() {
    const params = new URLSearchParams();
    const type = document.getElementById('type-filter').value;
    const status = document.getElementById('status-filter').value;
    const dateFrom = document.getElementById('date-from').value;
    const dateTo = document.getElementById('date-to').value;

    if (type) params.append('type', type);
    if (status) params.append('status', status);
    if (dateFrom) params.append('date_from', dateFrom);
    if (dateTo) params.append('date_to', dateTo);

    window.location.href = `/api/v1/admin/export/transactions.csv?${params}`;
}
</script>
{% endblock %}
